<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BAND FESTIVAL ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Pretendard:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --summer-green: #22c55e;
            --ocean-blue: #3b82f6;
            --soft-white: #f8fafc;
            --mice-gold: #c88a4e;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--soft-white);
            color: #1e293b;
            scroll-behavior: smooth;
            cursor: none;
        }

        .font-hand { font-family: 'Gaegu', cursive; }

        /* ✨ Custom Cursor */
        #cursor-dot { width: 8px; height: 8px; background: var(--summer-green); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid var(--summer-green); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: all 0.15s ease-out; opacity: 0.5; }
        .cursor-hover #cursor-outline { transform: scale(1.5); background: rgba(34, 197, 94, 0.1); border-color: var(--ocean-blue); }

        /* ✨ Roadmap Grid Styling */
        .roadmap-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            perspective: 1000px;
        }

        .calendar-card {
            position: relative;
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 280px;
        }

        /* 호버 시 LP판이 나오는 효과 */
        .vinyl-record {
            position: absolute;
            right: -60px;
            top: 50%;
            transform: translateY(-50%) rotate(0deg);
            width: 180px;
            height: 180px;
            background: #111;
            border-radius: 50%;
            background: radial-gradient(circle at center, #333 0%, #111 40%, #222 41%, #111 60%, #333 100%);
            border: 2px solid #333;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: -1;
            opacity: 0;
        }

        .calendar-card:hover {
            transform: translateX(10px) translateY(-5px);
            border-color: var(--summer-green);
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
        }

        .calendar-card:hover .vinyl-record {
            right: -30px;
            rotate: 180deg;
            opacity: 1;
        }

        .month-num {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(180deg, #f1f5f9 0%, transparent 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: absolute;
            top: 10px;
            left: 20px;
            z-index: 0;
        }

        .card-content { position: relative; z-index: 10; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Dropdown */
        .nav-dropdown { visibility: hidden; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .nav-item:hover .nav-dropdown { visibility: visible; opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <nav id="navbar" class="fixed w-full z-[100] transition-all duration-500 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-white/80 backdrop-blur-2xl rounded-full px-8 py-3 shadow-xl border border-white/40">
            <a href="#" class="text-2xl font-bold font-hand text-green-700 flex items-center gap-2">
                <i class="fa-solid fa-compact-disc animate-spin-slow"></i> K-BAND ARCHIVE
            </a>
            <div class="hidden md:flex space-x-8 font-bold text-slate-700">
                <div class="nav-item relative px-4 py-2 group cursor-pointer">
                    <span>아카이브 <i class="fa-solid fa-chevron-down text-[10px]"></i></span>
                    <div class="nav-dropdown absolute top-full left-0 mt-4 w-48 bg-white rounded-2xl shadow-2xl p-2 border">
                        <a href="#history" class="block px-4 py-3 text-sm hover:bg-green-500 hover:text-white rounded-xl transition">인디 역사</a>
                        <a href="#insight" class="block px-4 py-3 text-sm hover:bg-green-500 hover:text-white rounded-xl transition">산업 분석</a>
                    </div>
                </div>
                <div class="nav-item relative px-4 py-2 group cursor-pointer">
                    <span>2026 가이드 <i class="fa-solid fa-chevron-down text-[10px]"></i></span>
                    <div class="nav-dropdown absolute top-full left-0 mt-4 w-48 bg-white rounded-2xl shadow-2xl p-2 border">
                        <a href="#calendar" class="block px-4 py-3 text-sm hover:bg-green-500 hover:text-white rounded-xl transition">연간 로드맵</a>
                        <a href="#festivals" class="block px-4 py-3 text-sm hover:bg-green-500 hover:text-white rounded-xl transition">5대 메이저</a>
                    </div>
                </div>
            </div>
            <a href="#quiz" class="bg-green-500 text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg">내 성향 찾기</a>
        </div>
    </nav>

    <section id="calendar" class="py-40 bg-slate-50 px-6 relative overflow-hidden">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-24 reveal">
                <h2 class="text-2xl font-black text-green-500 mb-4 tracking-widest">TIMELINE</h2>
                <h3 class="text-6xl font-hand text-slate-900 mb-6">2026 페스티벌 연간 로드맵</h3>
                <p class="text-slate-400 max-w-xl mx-auto">각 달의 카드를 탐색해보세요. 당신의 계절을 채울 특별한 밴드 사운드가 기다리고 있습니다.</p>
            </div>

            <div class="roadmap-container">
                <script>
                    const roadmap = [
                        { m: '01', n: 'FIRST MUSIC STATION', desc: '새해의 시작을 알리는 뜨거운 실내 열기', tag: 'Indoor' },
                        { m: '02', n: '원주 전국 밴드 페스티벌', desc: '지역 인디의 자존심을 보여주는 무대', tag: 'Local' },
                        { m: '03', n: 'THE GLOW', desc: '실내 광학 아트와 밴드 사운드의 융합', tag: 'Visual' },
                        { m: '04', n: '러브썸 페스티벌', desc: '벚꽃 잎이 흩날리는 낭만적인 피크닉', tag: 'Romantic' },
                        { m: '05', n: 'Beautiful Mint Life', desc: '세상에서 가장 아름다운 봄날의 주말', tag: 'Spring' },
                        { m: '06', n: 'Seoul Jazz Festival', desc: '도심 속에서 즐기는 글로벌 프리미엄 라이브', tag: 'Luxury' },
                        { m: '07', n: 'Have A Nice Trip', desc: '여름 휴가를 대신할 강력한 해외 라인업', tag: 'Global' },
                        { m: '08', n: '인천 펜타포트', desc: '대한민국 락 스피릿의 성지이자 자존심', tag: 'Legend' },
                        { m: '09', n: '렛츠락 페스티벌', desc: '난지 한강공원의 시원한 강바람과 함성', tag: 'Riverside' },
                        { m: '10', n: '부산 국제 록페', desc: '낙동강 노을 아래 터지는 압도적 에너지', tag: 'Outdoor' },
                        { m: '11', n: 'Grand Mint Festival', desc: '가을 음악 신을 총결산하는 세련된 소풍', tag: 'Autumn' },
                        { m: '12', n: '카운트다운 판타지', desc: '밴드와 함께 외치는 새해의 첫 순간', tag: 'NewYear' }
                    ];

                    roadmap.forEach(r => {
                        document.write(`
                            <div class="calendar-card reveal">
                                <div class="month-num">${r.m}</div>
                                <div class="vinyl-record"></div>
                                <div class="card-content mt-8">
                                    <span class="inline-block px-3 py-1 bg-green-50 text-green-600 rounded-lg text-[10px] font-black uppercase tracking-widest mb-4 border border-green-100">${r.tag}</span>
                                    <h4 class="text-2xl font-black text-slate-800 mb-3 font-hand">${r.n}</h4>
                                    <p class="text-slate-500 text-sm leading-relaxed">${r.desc}</p>
                                </div>
                                <div class="flex justify-between items-center mt-6 card-content">
                                    <span class="text-xs font-bold text-slate-300">EXPLORE MORE</span>
                                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-green-500 group-hover:text-white transition">
                                        <i class="fa-solid fa-arrow-right"></i>
                                    </div>
                                </div>
                            </div>
                        `);
                    });
                </script>
            </div>
        </div>
    </section>

    <footer class="py-20 px-6 bg-white text-center border-t">
        <h2 class="text-4xl font-hand text-slate-800 mb-10 leading-tight">당신의 청춘은 어떤 사운드로 기록될까요?</h2>
        <div class="flex justify-center space-x-12 mb-12 text-3xl">
            <a href="https://www.instagram.com/yuntack_4/" target="_blank" class="text-slate-300 hover:text-pink-500 transition"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.youtube.com/@jithemax" target="_blank" class="text-slate-300 hover:text-red-500 transition"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://blog.naver.com/jiyunnn_n" target="_blank" class="text-slate-300 hover:text-green-500 transition"><i class="fa-solid fa-blog"></i></a>
        </div>
        <p class="text-slate-400 font-medium text-xs tracking-widest uppercase">© K-BAND FESTIVAL PORTAL. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // --- Custom Cursor ---
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = `${e.clientX}px`;
            dot.style.top = `${e.clientY}px`;
            outline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" });
        });
        document.querySelectorAll('a, button, .calendar-card').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });

        // --- Scroll Reveal ---
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active');
            });
        });
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reveal').forEach(el => { if(el.getBoundingClientRect().top < window.innerHeight) el.classList.add('active'); });
        });
    </script>
</body>
</html>
